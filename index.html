<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point Barbershop</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #f5f5f5;
            overflow-x: hidden;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #d4af37, #a68a2e);
            border-radius: 5px;
        }

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.95) 0%, rgba(36, 36, 36, 0.9) 100%);
            z-index: -2;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            opacity: 0.05;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect fill="%23d4af37" width="400" height="400"/><circle cx="50" cy="50" r="30" fill="none" stroke="%23d4af37" stroke-width="1" opacity="0.5"/></svg>');
            background-size: 400px 400px;
            z-index: -1;
            animation: drift 20s linear infinite;
        }

        .mouse-light {
            position: fixed;
            width: 384px;
            height: 384px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
            opacity: 0.2;
            transition: all 0.1s ease-out;
        }

        .content {
            max-width: 500px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 10;
            animation: fadeIn 0.6s ease-out;
        }

        /* Logo */
        .logo-container {
            margin-bottom: 60px;
            display: flex;
            justify-content: center;
            animation: float 3s ease-in-out infinite;
        }

        .logo-wrapper {
            position: relative;
            width: 128px;
            height: 128px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 30% 30%, rgba(212, 175, 55, 0.2), rgba(26, 26, 26, 0.8));
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.3), inset -2px -2px 5px rgba(0, 0, 0, 0.5), inset 2px 2px 5px rgba(212, 175, 55, 0.1);
            transform: perspective(1000px) rotateX(5deg) rotateY(-5deg);
            transition: all 0.3s ease;
        }

        .logo-wrapper img {
            width: 96px;
            height: 96px;
            object-fit: contain;
            filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.5));
        }

        /* Header */
        .header {
            margin-bottom: 40px;
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            background: linear-gradient(to right, #ffffff, #d4af37, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #d4af37;
            font-size: 0.875rem;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .divider::before,
        .divider::after {
            content: '';
            width: 48px;
            height: 1px;
            background: linear-gradient(to right, transparent, #d4af37);
        }

        .divider::after {
            background: linear-gradient(to left, transparent, #d4af37);
        }

        /* Address Cards */
        .address-card {
            background: linear-gradient(135deg, rgba(36, 36, 36, 0.6) 0%, rgba(26, 26, 26, 0.4) 100%);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            text-align: center; /* Центрирование содержимого */
            animation: slideInUp 0.6s ease-out;
        }

        .address-card:hover {
            border-color: #d4af37;
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.2);
        }

        .address-name {
            font-weight: 700;
            font-size: 1.25rem;
            color: #f5f5f5;
            transition: color 0.3s ease;
        }

        .address-card:hover .address-name {
            color: #d4af37;
        }

        .address-side {
            font-size: 0.875rem;
            color: #999999;
            margin-top: 4px;
        }

        /* Submenu */
        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: all 0.5s ease-in-out;
            opacity: 0;
            margin-top: 0;
        }

        .address-card.active .submenu {
            max-height: 500px;
            opacity: 1;
            margin-top: 24px;
        }

        /* Online Booking Button */
        .btn-online {
            display: block;
            padding: 16px;
            background: #d4af37;
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 800;
            border-radius: 8px;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            animation: pulse-blink 2s infinite;
        }

        @keyframes pulse-blink {
            0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 rgba(212, 175, 55, 0); }
            50% { opacity: 0.85; transform: scale(0.98); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        }

        /* Contact Blocks */
        .contact-grid {
            display: flex;
            flex-direction: column; /* Контакты в один ряд (вертикально) */
            gap: 12px;
        }

        .contact-block {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            text-decoration: none;
            color: #f5f5f5;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .contact-block:hover {
            background: rgba(212, 175, 55, 0.1);
            border-color: #d4af37;
        }

        .contact-block img {
            width: 20px;
            height: 20px;
        }

        /* Website Link Style (Simple) */
        .website-link {
            display: inline-block;
            margin-top: 40px;
            color: #d4af37;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
        }

        .website-link:hover {
            color: #ffffff;
            border-bottom-color: #ffffff;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #666666;
        }

        /* Original Animations */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(20px, 10px); }
            50% { transform: translate(0, 20px); }
            75% { transform: translate(-20px, 10px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title { font-size: 2.5rem; }
            .address-card { padding: 20px; }
        }

        .line-top, .line-bottom {
            position: fixed;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(to right, transparent, #d4af37, transparent);
            z-index: 20;
        }
        .line-top { top: 0; }
        .line-bottom { bottom: 0; }
    </style>
</head>

    <script>
        // Mouse following light effect
        const mouseLight = document.getElementById('mouseLight');
        document.addEventListener('mousemove', (e) => {
            mouseLight.style.left = (e.clientX - 192) + 'px';
            mouseLight.style.top = (e.clientY - 192) + 'px';
        });

        // Toggle cards
        function toggleCard(card) {
            const isActive = card.classList.contains('active');
            document.querySelectorAll('.address-card').forEach(c => c.classList.remove('active'));
            if (!isActive) card.classList.add('active');
        }
    </script>
